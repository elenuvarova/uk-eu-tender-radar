name: Manual ingestion

# NOTE: weekly PRODUCTION ingestion runs SERVER-SIDE via a host cron that
# `docker exec`s into the live Coolify container (see ops/ingest-cron.sh +
# the root crontab on the Hetzner box). Prod Postgres lives on the server's
# internal Docker network and is NOT reachable from a GitHub runner, so the
# weekly `schedule` trigger was removed to stop it failing every Monday.
# This workflow is kept for manual runs against a CI-reachable DATABASE_URL.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days of history to fetch"
        default: "8"
        required: false
      niche_only:
        description: "Niche-only filter (digital/edtech CPV)"
        type: boolean
        default: true

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install --no-cache-dir ./backend

      - name: Run UK FTS ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Pass inputs via env, never interpolated into the shell line, so a
          # crafted `days` value can't inject commands. NICHE is computed from
          # the boolean expression (no untrusted text) and referenced quoted.
          DAYS: ${{ github.event.inputs.days || '8' }}
          NICHE: ${{ github.event.inputs.niche_only != 'false' && '--niche-only' || '' }}
        run: |
          python -m app.ingestion.run --source fts --days "$DAYS" $NICHE

      - name: Run EU TED ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DAYS: ${{ github.event.inputs.days || '8' }}
          NICHE: ${{ github.event.inputs.niche_only != 'false' && '--niche-only' || '' }}
        run: |
          python -m app.ingestion.run --source ted --days "$DAYS" $NICHE
